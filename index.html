<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPROTECH Intranet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
:root{
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --amber:#BA7517;--green:#1D9E75;--blue:#185FA5;--red:#D85A30;
  --border:#e0dfd8;--bg:#f5f4f0;--card:#ffffff;--text:#1a1a1a;--muted:#6b6a65;
  --radius:10px;--radius-lg:14px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1918;--card:#252422;--text:#f0ede8;--muted:#888780;
  --border:#333230;--purple-l:#26215C
}}

/* ====== LOGIN ====== */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-box{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px}
.login-logo{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.8px;margin-bottom:6px}
.login-logo b{color:var(--purple)}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-lbl{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.4px}
.login-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
.login-input:focus{border-color:var(--purple)}
.login-btn{width:100%;padding:13px;border:none;border-radius:var(--radius);background:var(--purple);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.login-btn:hover{background:var(--purple-d)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed}
.login-err{background:#FCEBEB;color:#501313;border:1px solid #F7C1C1;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.login-ver{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}

/* ====== APP ====== */
#app-screen{display:none;flex-direction:column;min-height:100vh;max-width:960px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.logo b{color:var(--purple)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;cursor:pointer}
.user-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.user-nm{font-size:12px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--muted)}
.menu-btn{width:38px;height:38px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:19px;display:flex;align-items:center;justify-content:center}
.nav-drawer{display:none;background:var(--card);border-bottom:1px solid var(--border);padding:12px}
.nav-drawer.open{display:block}
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 6px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-size:11px;text-align:center;font-family:inherit;transition:all 0.15s;line-height:1.3}
.ni:hover{background:var(--card);color:var(--text)}
.ni.active{background:var(--purple-l);color:#26215C;border-color:var(--purple);font-weight:600}
@media(prefers-color-scheme:dark){.ni.active{background:#26215C;color:#CECBF6}}
.ni-ic{font-size:19px;line-height:1}
.mn{flex:1;padding:16px}

/* ====== COMMON UI ====== */
h1{font-size:19px;font-weight:700;color:var(--text);margin-bottom:4px}
.ph{margin-bottom:14px}
.ph p{font-size:12px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.gkpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.kpi-v{font-size:22px;font-weight:700;color:var(--text)}
.kpi-l{font-size:11px;color:var(--muted);margin-top:3px}
.kpi-s{font-size:11px;margin-top:2px;font-weight:600}
/* badges */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.bp{background:#EEEDFE;color:#26215C}.ba{background:#FAEEDA;color:#633806}.bt{background:#E1F5EE;color:#085041}
.bc{background:#FAECE7;color:#4A1B0C}.bg{background:#f0efe8;color:#5F5E5A}.bgr{background:#EAF3DE;color:#173404}
.bbl{background:#E6F1FB;color:#042C53}.bred{background:#FCEBEB;color:#501313}
@media(prefers-color-scheme:dark){.bp{background:#26215C;color:#CECBF6}.ba{background:#412402;color:#FAC775}.bt{background:#04342C;color:#9FE1CB}.bc{background:#4A1B0C;color:#F5C4B3}.bgr{background:#173404;color:#C0DD97}.bbl{background:#042C53;color:#B5D4F4}.bred{background:#501313;color:#F7C1C1}.bg{background:#2c2c2a;color:#B4B2A9}}
/* buttons */
.btn-p{font-size:13px;padding:9px 16px;border:none;border-radius:var(--radius);background:var(--purple);color:#fff;cursor:pointer;font-weight:600;font-family:inherit}
.btn-p:hover{background:var(--purple-d)}.btn-p:disabled{opacity:0.5;cursor:not-allowed}
.btn-s{font-size:13px;padding:8px 13px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit}
/* forms */
input,select,textarea{font-size:13px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);font-family:inherit;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:80px}
.frm-r{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.frm-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:500}
/* filters */
.sf{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.sf-btn{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.sf-btn.active{background:var(--purple-l);color:#26215C;border-color:var(--purple);font-weight:600}
@media(prefers-color-scheme:dark){.sf-btn.active{background:#26215C;color:#CECBF6}}
/* tasks */
.kb-col{background:var(--bg);border-radius:var(--radius);padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.kbh{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;color:var(--muted)}
.kbn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:10px}
.tk{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:7px}
.tk-a{display:flex;gap:5px;margin-top:8px}
.tk-btn{flex:1;font-size:11px;padding:6px 4px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit}
/* announcements */
.ann{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid var(--border)}
.ann-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;color:#fff}
/* tickets */
.tkt{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px}
.tkt-btn{font-size:12px;padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit}
.tkt-btn.go{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.tkt-btn.res{background:#E6F1FB;color:#042C53;border-color:#B5D4F4}
/* org chart */
.oc-scroll{overflow:auto;-webkit-overflow-scrolling:touch;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.oc-node{display:flex;flex-direction:column;align-items:center}
.oc-box{min-width:90px;max-width:115px;padding:9px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);text-align:center;transition:all 0.15s}
.oc-box.clickable{cursor:pointer}
.oc-box.clickable:hover{background:var(--bg)}
.oc-box.sel{border-color:var(--purple);box-shadow:0 0 0 3px rgba(83,74,183,0.15)}
.oc-nm{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.oc-rl{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
/* onboarding */
.ob-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;cursor:pointer}
.ob-card:active{opacity:0.85}
.chk-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.chk-box{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--card);transition:all 0.15s}
.chk-box.done{background:var(--green);border-color:var(--green)}
.chk-lbl{font-size:13px;color:var(--text);line-height:1.4}
.chk-lbl.done{color:var(--muted);text-decoration:line-through}
/* chat / AI */
.chat-m{min-height:280px;max-height:360px;overflow-y:auto;padding:13px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.mu{align-self:flex-end;background:var(--purple);color:#fff;border-radius:16px 16px 3px 16px;padding:10px 14px;max-width:85%;font-size:13px;line-height:1.5;word-break:break-word}
.ma{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-radius:16px 16px 16px 3px;padding:10px 14px;max-width:85%;font-size:13px;line-height:1.5;color:var(--text);word-break:break-word;white-space:pre-wrap}
.chat-ir{display:flex;gap:8px}
.chat-ir input{flex:1}
/* role badge */
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
/* access denied */
.no-access{text-align:center;padding:50px 20px;color:var(--muted)}
.no-access-ic{font-size:40px;margin-bottom:12px}
/* progress */
.prog-wrap{height:7px;background:var(--bg);border-radius:4px}
.prog-fill{height:100%;border-radius:4px}
/* loading */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:13px}
.urgr{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 11px;background:var(--bg);border-radius:var(--radius);margin-bottom:6px;gap:8px}
.dbar{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
</style>
</head>

function b(t,c){return '<span class="badge '+c+'">'+t+'</span>';}
function dbadge(d){return b(d,ROLE_BADGE[d]||'bg');}
function pbadge(p){var m={high:['Urgent','bc'],medium:['Moyen','ba'],low:['Faible','bg']};return b(m[p]?m[p][0]:p,m[p]?m[p][1]:'bg');}
function calcPct(ob){var d=ob.checklist.filter(function(t){return t.done;}).length;return ob.checklist.length?Math.round(d/ob.checklist.length*100):0;}
function pctColor(p){return p>=80?'#1D9E75':p>=40?'#BA7517':'#D85A30';}
function progBar(p,h){h=h||7;return '<div class="prog-wrap" style="height:'+h+'px"><div class="prog-fill" style="width:'+p+'%;background:'+pctColor(p)+'"></div></div>';}
function isAdmin(){return currentProfile&&ADMIN_ROLES.includes(currentProfile.role);}
function getDept(){return currentProfile?currentProfile.department:'Technical';}

// AUTH
// ============================================================
async function initAuth(){
  document.getElementById('loading-screen').style.display='flex';
  var {data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    await loadProfile();
    showApp();
  } else {
    showLogin();
  }
  document.getElementById('loading-screen').style.display='none';
  sb.auth.onAuthStateChange(async function(event,session){
    if(event==='SIGNED_IN'){currentUser=session.user;await loadProfile();showApp();}
    if(event==='SIGNED_OUT'){currentUser=null;currentProfile=null;showLogin();}
  });
}

async function loadProfile(){
  var {data,error}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(data)currentProfile=data;
  else {
    // Profil pas encore créé — on prend les métadonnées
    currentProfile={
      id:currentUser.id,
      full_name:currentUser.user_metadata?.full_name||currentUser.email.split('@')[0],
      department:currentUser.user_metadata?.department||'Technical',
      role:currentUser.user_metadata?.role||'Technical',
      email:currentUser.email
    };
  }
}

async function doLogin(){
  var email=document.getElementById('login-email').value.trim();
  var pwd=document.getElementById('login-pwd').value;
  var err=document.getElementById('login-err');
  var btn=document.getElementById('login-btn');
  err.style.display='none';
  if(!email||!pwd){err.textContent='Veuillez remplir tous les champs.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Connexion en cours...';
  var {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent='Email ou mot de passe incorrect.';err.style.display='block';btn.disabled=false;btn.textContent='Se connecter →';}
}

async function doLogout(){
  await sb.auth.signOut();
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='Se connecter →';
}

  document.getElementById('login-screen').style.display='none';

function go(id,btn){

  navOpen=false;
  document.getElementById('nav').className='nav-drawer';

  var rf={dash:rDash,tasks:rTasks,comm:rComm,crm:rCRM,sup:rSup,org:rOrg,ob:rOnboarding,rep:rRep,ai:rAI};
  var fn=rf[id];
  if(!fn){document.getElementById('mn').innerHTML='<div class="no-access"><div class="no-access-ic">🔒</div><div>Module non disponible pour votre rôle.</div></div>';return;}
  document.getElementById('mn').innerHTML=fn();
  var ifs={dash:iDash,rep:iRep};
  if(ifs[id])setTimeout(ifs[id],80);
  if(id==='ai'){var cm=document.getElementById('cm');if(cm&&aiMsgs.length)cm.scrollTop=cm.scrollHeight;}
}

      (t.st!=='resolved'?'<div style="display:flex;gap:8px">'+(t.st==='open'?'<button class="tkt-btn go" onclick="updTkt('+t.id+',\'inprog\')">Prendre en charge</button>':'')+
      '<button class="tkt-btn res" onclick="updTkt('+t.id+',\'resolved\')">✓ Résoudre</button></div>':'<span style="font-size:12px;font-weight:600;color:#1D9E75">✓ Résolu</span>')+
      '</div></div>';}).join('');
}

// ORG CHART — Lecture pour tous, édition pour Admin/HR
// ============================================================
function findOCN(n,id){if(n.id===id)return n;for(var i=0;i<(n.children||[]).length;i++){var f=findOCN(n.children[i],id);if(f)return f;}return null;}
function findOCP(n,id){for(var i=0;i<(n.children||[]).length;i++){if(n.children[i].id===id)return n;var f=findOCP(n.children[i],id);if(f)return f;}return null;}
function countOCN(n){return 1+(n.children||[]).reduce(function(a,c){return a+countOCN(c);},0);}
function renderOCN(n){
  var c=ROLE_COLORS[n.dept]||'#888780';
  var canEdit=isAdmin()||getDept()==='HR';
  var box='<div class="oc-box'+(canEdit?' clickable':'')+' '+(n.id===selOCId?'sel':'')+'" style="border-top:3px solid '+c+'" '+(canEdit?'onclick="selOC('+n.id+')"':'')+'>'+
    '<div class="oc-nm">'+n.name+'</div><div class="oc-rl">'+n.role+'</div></div>';
  var ch=n.children||[];
  if(!ch.length)return '<div class="oc-node">'+box+'</div>';
  var vl='<div style="width:1px;height:14px;background:var(--border);margin:0 auto"></div>';
  var row=ch.map(function(c){return '<div style="display:inline-flex;flex-direction:column;align-items:center;padding:0 4px"><div style="width:1px;height:14px;background:var(--border);margin:0 auto"></div>'+renderOCN(c)+'</div>';}).join('');
  return '<div class="oc-node">'+box+vl+'<div style="display:inline-flex;align-items:flex-start">'+row+'</div></div>';
}
function rOrg(){
  var canEdit=isAdmin()||getDept()==='HR';
  var sel=selOCId?findOCN(orgData,selOCId):null;
  var ep='';
  if(sel&&canEdit){ep='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:15px;font-weight:700">Modifier : '+sel.name+'</span><button class="btn-s" onclick="selOCId=null;go(\'org\',document.querySelector(\'.ni.active\'))">✕</button></div>'+
    '<div class="frm-r"><div><div class="frm-lbl">Nom</div><input id="oc-nm" value="'+sel.name+'"></div><div><div class="frm-lbl">Rôle</div><input id="oc-rl" value="'+sel.role+'"></div><div><div class="frm-lbl">Département</div><select id="oc-dp">'+['Admin','Technical','Sales & Marketing','HR','Finance','Support'].map(function(d){return '<option'+(sel.dept===d?' selected':'')+'>'+d+'</option>';}).join('')+'</select></div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-p" onclick="saveOC()">✓ Enregistrer</button><button class="btn-s" onclick="addOCChild()">+ Subordonné</button>'+(sel.id>2?'<button class="btn-s" style="color:var(--red)" onclick="delOC()">Supprimer</button>':'')+'</div></div>';}
  return '<div class="ph"><h1>Organigramme IMPROTECH</h1><p>'+(canEdit?'Touchez un poste pour le modifier · ':'Lecture seule · ')+countOCN(orgData)+' postes</p></div>'+
    '<div class="oc-scroll"><div style="min-width:max-content;padding:8px">'+renderOCN(orgData)+'</div></div>'+ep;
}
function selOC(id){if(!isAdmin()&&getDept()!=='HR')return;selOCId=id;go('org',document.querySelector('.ni.active'));}
function saveOC(){var n=findOCN(orgData,selOCId);if(!n)return;n.name=document.getElementById('oc-nm').value;n.role=document.getElementById('oc-rl').value;n.dept=document.getElementById('oc-dp').value;selOCId=null;go('org',document.querySelector('.ni.active'));}
function addOCChild(){var n=findOCN(orgData,selOCId);if(!n)return;if(!n.children)n.children=[];n.children.push({id:nextOCId++,name:"Nouveau poste",role:"Rôle",dept:n.dept,children:[]});go('org',document.querySelector('.ni.active'));}
function delOC(){if(!confirm('Supprimer ce poste ?'))return;var p=findOCP(orgData,selOCId);if(!p)return;p.children=p.children.filter(function(c){return c.id!==selOCId;});selOCId=null;go('org',document.querySelector('.ni.active'));}

// ONBOARDING — HR + Admin
// ============================================================
function rNewOBForm(){return '<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Nouveau dossier d\'onboarding</div><div class="frm-r"><div><div class="frm-lbl">Nom complet *</div><input id="ob-nm" placeholder="Ex: Ama Owusu"></div><div><div class="frm-lbl">Département *</div><select id="ob-dp">'+['Technical','Sales & Marketing','HR','Finance','Support'].map(function(d){return '<option>'+d+'</option>';}).join('')+'</select></div><div><div class="frm-lbl">Date de début</div><input id="ob-st" placeholder="Ex: 5 Mai 2026"></div><div><div class="frm-lbl">Manager direct</div><input id="ob-mg"></div><div><div class="frm-lbl">Email professionnel</div><input id="ob-em" placeholder="prenom.nom@improtechsystems.com"></div><div style="display:flex;align-items:flex-end"><button class="btn-p" onclick="createOB()" style="width:100%;margin-top:8px">Créer le dossier →</button></div></div></div>';}
function rObDetail(){
  var ob=onboardings.find(function(o){return o.id===viewObId;});
  if(!ob){viewObId=null;return rOnboarding();}
  var pct=calcPct(ob);
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><button class="btn-s" onclick="viewObId=null;go(\'ob\',document.querySelector(\'.ni.active\'))">&larr; Retour</button><h1>'+ob.name+'</h1>'+dbadge(ob.dept)+'</div>'+
    '<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Informations</div>'+
    [['Département',ob.dept],['Début',ob.start],['Manager',ob.mgr],['Email',ob.email]].map(function(r){return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--muted)">'+r[0]+'</span><span style="font-weight:600">'+r[1]+'</span></div>';}).join('')+
    '<div style="padding:12px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:700">Progression</span><span style="font-weight:700;color:'+pctColor(pct)+'">'+pct+'%</span></div>'+progBar(pct,10)+'</div></div>'+
    '<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Checklist — '+ob.dept+' <span style="font-size:12px;font-weight:400;color:var(--muted)">'+ob.checklist.filter(function(t){return t.done;}).length+'/'+ob.checklist.length+'</span></div>'+
    ob.checklist.map(function(t){return '<div class="chk-row" onclick="toggleOBTask('+ob.id+','+t.id+')"><div class="chk-box'+(t.done?' done':'')+'">'+
      (t.done?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>':'')+
      '</div><span class="chk-lbl'+(t.done?' done':'')+'">'+t.t+'</span></div>';}).join('')+'</div>';
}
function rOnboarding(){
  if(!isAdmin()&&getDept()!=='HR')return '<div class="no-access"><div class="no-access-ic">🔒</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Accès restreint</div><div>Ce module est réservé à l\'équipe RH.</div></div>';
  if(viewObId!==null)return rObDetail();
  var flist=obFilter==='Tous'?onboardings:onboardings.filter(function(o){return o.dept===obFilter;});
  return '<div class="ph"><h1>Onboarding</h1><p>Gestion de l\'intégration des nouveaux employés</p></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
    '<div class="sf" style="margin:0">'+['Tous','Technical','Sales & Marketing','HR','Finance','Support'].map(function(d){return '<button class="sf-btn'+(obFilter===d?' active':'')+'" onclick="obFilter=\''+d+'\';go(\'ob\',document.querySelector(\'.ni.active\'))">'+d+'</button>';}).join('')+'</div>'+
    '<button class="btn-p" onclick="showOBForm=!showOBForm;go(\'ob\',document.querySelector(\'.ni.active\'))">'+(showOBForm?'✕ Annuler':'+ Nouvel onboarding')+'</button></div>'+
    (showOBForm?rNewOBForm():'')+
    (flist.length?flist.map(function(ob){var pct=calcPct(ob);var dc=ROLE_COLORS[ob.dept]||'#534AB7';
      return '<div class="ob-card" onclick="viewObId='+ob.id+';go(\'ob\',document.querySelector(\'.ni.active\'))">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">'+
        '<div><div style="font-size:15px;font-weight:700">'+ob.name+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+ob.dept+' · '+ob.start+'</div></div>'+
        '<div style="width:40px;height:40px;border-radius:50%;background:'+dc+'22;color:'+dc+';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700">'+ob.name[0]+'</div></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px"><span>Progression</span><span style="font-weight:700;color:'+pctColor(pct)+'">'+pct+'%</span></div>'+
        progBar(pct,7)+
        '<div style="display:flex;justify-content:space-between;margin-top:9px;font-size:12px;color:var(--muted)"><span>Manager : <b style="color:var(--text)">'+ob.mgr+'</b></span><span>'+ob.checklist.filter(function(t){return t.done;}).length+'/'+ob.checklist.length+' tâches ›</span></div></div>';}).join(''):
    '<div style="text-align:center;padding:40px 0;color:var(--muted)">Aucun onboarding actif.</div>');
}
function createOB(){var name=document.getElementById('ob-nm')?.value.trim();if(!name)return;var dept=document.getElementById('ob-dp').value;var cl=(DTASKS[dept]||[]).map(function(t,i){return {id:i+1,t:t,done:false};});onboardings.push({id:nextObId++,name,dept,start:document.getElementById('ob-st').value||'—',mgr:document.getElementById('ob-mg').value||'—',email:document.getElementById('ob-em').value||'—',checklist:cl});showOBForm=false;go('ob',document.querySelector('.ni.active'));}
function toggleOBTask(obId,tid){var ob=onboardings.find(function(o){return o.id===obId;});if(!ob)return;var t=ob.checklist.find(function(x){return x.id===tid;});if(t)t.done=!t.done;go('ob',document.querySelector('.ni.active'));}

// ============================================================
// REPORTS — Admin + Finance
// ============================================================
function rRep(){
  var dept=getDept();
  if(!isAdmin()&&dept!=='Finance')return '<div class="no-access"><div class="no-access-ic">🔒</div><div style="font-size:15px;font-weight:600;margin-bottom:6px">Accès restreint</div><div>Ce module est réservé à l\'équipe Finance et aux administrateurs.</div></div>';
  var byDept=['Technical','Sales & Marketing','HR','Finance','Support'].map(function(d){var tot=tasks.filter(function(t){return t.dept===d;}).length;var done=tasks.filter(function(t){return t.dept===d&&t.st==='done';}).length;return {d:d,tot:tot,done:done};});
  var mx=Math.max.apply(null,byDept.map(function(x){return x.tot;}));
  return '<div class="ph"><h1>Rapports & Analytics</h1><p>Vue financière — Avril 2026</p></div>'+
    '<div class="gkpi">'+[['$140k','CA Avril'],['34%','Taux clôture'],['29','Étudiants actifs'],['95%','Uptime']].map(function(k){return '<div class="kpi"><div class="kpi-v">'+k[0]+'</div><div class="kpi-l">'+k[1]+'</div></div>';}).join('')+'</div>'+
    '<div class="card" style="margin-bottom:10px"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Tâches par département</div>'+
    byDept.map(function(x){return '<div class="dbar"><div style="font-size:12px;color:var(--muted);width:130px;flex-shrink:0">'+x.d+'</div><div style="flex:1;height:9px;background:var(--bg);border-radius:5px;margin:0 8px"><div style="height:100%;border-radius:5px;background:'+(ROLE_COLORS[x.d]||'#534AB7')+';width:'+(mx?Math.round(x.tot/mx*100):0)+'%"></div></div><span style="font-size:13px;font-weight:700;width:18px">'+x.tot+'</span><span style="font-size:11px;color:var(--green);width:65px;text-align:right">'+x.done+' faites</span></div>';}).join('')+'</div>'+
    '<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:10px">Revenus mensuels</div><canvas id="rv2" height="170"></canvas></div>';
}
function iRep(){var c=document.getElementById('rv2');if(!c||!window.Chart)return;if(chts.rv2)chts.rv2.destroy();chts.rv2=new Chart(c,{type:'line',data:{labels:revD.map(function(d){return d.m;}),datasets:[{label:'Services',data:revD.map(function(d){return d.s;}),borderColor:'#534AB7',backgroundColor:'rgba(83,74,183,0.1)',tension:0.4,fill:true,pointRadius:4},{label:'Formation',data:revD.map(function(d){return d.t;}),borderColor:'#BA7517',backgroundColor:'rgba(186,117,23,0.1)',tension:0.4,fill:true,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:12},callback:function(v){return '$'+v+'k';}}}}}})}

// AI ASSISTANT
// ============================================================
function rAI(){
  var dept=getDept();
  var empty=!aiMsgs.length;
  return '<div class="ph"><h1>Assistant IA</h1><p>Propulsé par Claude · Contexte '+dept+' activé</p></div>'+
    '<div class="chat-m" id="cm">'+
    (empty?'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:20px">'+
    '<div style="width:48px;height:48px;border-radius:50%;background:var(--purple-l);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--purple)">✧</div>'+
    '<div style="font-size:15px;font-weight:700">Comment puis-je vous aider ?</div>'+
    '<div style="font-size:13px;color:var(--muted)">Contexte '+dept+' activé — je connais vos processus.</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;max-width:420px">'+
    ['Rédige un email de suivi client','Aide-moi à préparer une réunion','Quelles sont les bonnes pratiques '+dept+' ?','Résume les priorités de cette semaine'].map(function(s){return '<button style="padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);font-size:12px;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;line-height:1.4" onclick="pf(\''+s.replace(/'/g,"\\'")+'\')">'+s+'</button>';}).join('')+
    '</div></div>':aiMsgs.map(function(m){return '<div class="'+(m.r==='u'?'mu':'ma')+'">'+m.c.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>';}).join(''))+
    '</div>'+
    '<div class="chat-ir"><input id="ci" placeholder="Posez votre question..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendAI()}"><button class="btn-p" id="cb" onclick="sendAI()">Envoyer</button></div>';
}

// ============================================================
// ACTIONS
// ============================================================
function showTF(){var f=document.getElementById('tf-form');if(f)f.style.display=f.style.display==='none'?'block':'none';}
function addTask(){var t=document.getElementById('nt')?.value.trim();if(!t)return;var dept=document.getElementById('nd')?.value||getDept();tasks.push({id:Date.now(),title:t,dept:dept,p:document.getElementById('np').value,st:'todo',who:currentProfile?.full_name||'—',due:document.getElementById('ndue').value||'—'});go('tasks',document.querySelector('.ni.active'));}
function mv(id,st){var t=tasks.find(function(x){return x.id===id;});if(t){t.st=st;go('tasks',document.querySelector('.ni.active'));}}
function postAnn(){var au=document.getElementById('aa')?.value.trim(),bd=document.getElementById('ab')?.value.trim();if(!au||!bd)return;var dept=document.getElementById('ad').value;anns.unshift({id:Date.now(),au,dept,bd,tm:"l'instant"});var af=document.getElementById('af');if(af)af.innerHTML=renderAnns();document.getElementById('ab').value='';}
function updTkt(id,st){var t=tickets.find(function(x){return x.id===id;});if(t){t.st=st;go('sup',document.querySelector('.ni.active'));}}
function pf(t){var i=document.getElementById('ci');if(i){i.value=t;i.focus();}}

async function sendAI(){
  var inp=document.getElementById('ci'),btn=document.getElementById('cb');
  var txt=inp?.value.trim();if(!txt||!inp)return;
  var dept=getDept();
  aiMsgs.push({r:'u',c:txt});inp.value='';btn.disabled=true;btn.textContent='...';
  var cm=document.getElementById('cm');
  if(cm){cm.innerHTML=aiMsgs.map(function(m){return '<div class="'+(m.r==='u'?'mu':'ma')+'">'+m.c.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>';}).join('');cm.scrollTop=cm.scrollHeight;}
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:'Tu es l\'assistant IA interne d\'IMPROTECH, Accra Ghana. Tu parles à '+currentProfile?.full_name+', du département '+dept+'. Départements : Technical (CTO: Othniel), Sales & Marketing (MD: Tariq), HR (Kassum), Finance (Unclebert), Support/Help Desk. CEO: Verlein. Partenaires: Cisco, IBM, VMware, Palo Alto, Fortinet. Clients: MTN, Ecobank, GTBank, GRIDCO, SEMLEX. Adapte tes réponses au contexte '+dept+'. Réponds en français, professionnel et concis.',
      messages:aiMsgs.map(function(m){return {role:m.r==='u'?'user':'assistant',content:m.c};}),
    })});
    var data=await res.json();aiMsgs.push({r:'a',c:data.content?.[0]?.text||'Erreur.'});
  }catch(e){aiMsgs.push({r:'a',c:'Erreur de connexion.'});}
  btn.disabled=false;btn.textContent='Envoyer';
  var cm2=document.getElementById('cm');
  if(cm2){cm2.innerHTML=aiMsgs.map(function(m){return '<div class="'+(m.r==='u'?'mu':'ma')+'">'+m.c.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>';}).join('');cm2.scrollTop=cm2.scrollHeight;}
}
