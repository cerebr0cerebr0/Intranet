body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
:root{--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--amber:#BA7517;--green:#1D9E75;--blue:#185FA5;--red:#D85A30;--border:#e0dfd8;--bg:#f5f4f0;--card:#ffffff;--text:#1a1a1a;--muted:#6b6a65;--radius:10px;--radius-lg:14px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-wrap{width:100%;max-width:420px}
.login-logo{font-size:32px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--text)}
.login-logo b{color:var(--purple)}
.login-tagline{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px}
.login-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.login-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
.login-input:focus{border-color:var(--purple)}
.login-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--purple);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.login-btn:hover{background:var(--purple-d)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed}
.login-err{background:#FCEBEB;color:#501313;border:1px solid #F7C1C1;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:13px;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* APP */

.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.logo b{color:var(--purple)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;cursor:pointer}
.user-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.user-nm{font-size:12px;font-weight:600;color:var(--text)}
.user-dept{font-size:10px;color:var(--muted)}
.menu-btn{width:38px;height:38px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.nav-drawer{display:none;background:var(--card);border-bottom:1px solid var(--border);padding:12px}
.nav-drawer.open{display:block}
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 6px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-size:11px;text-align:center;font-family:inherit;line-height:1.3}
.ni:hover{background:var(--card);color:var(--text)}
.ni.active{background:var(--purple-l);color:#26215C;border-color:var(--purple);font-weight:700}

.ni-ic{font-size:20px;line-height:1}
.mn{flex:1;padding:16px}

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  err.style.display='none';
  if(!email||!pwd){err.textContent='Veuillez remplir tous les champs.';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='Connexion...';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    err.textContent='Email ou mot de passe incorrect. Vérifiez vos identifiants.';
    err.style.display='block';
    btn.disabled=false; btn.textContent='Se connecter →';
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

async function loadProfile(user) {
  // Cherche le profil dans Firestore
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()) {
    profile = snap.data();
  } else {
    // Profil par défaut si pas encore créé
    profile = {
      uid: user.uid,
      displayName: user.displayName || user.email.split('@')[0],
      email: user.email,
      department: 'Technical',
      role: 'Employee'
    };
    // Sauvegarde dans Firestore
    await setDoc(ref, profile);
  }
}

onAuthStateChanged(auth, async (user) => {
  if(user) {
    currentUser = user;
    await loadProfile(user);
    showApp();
  } else {
    currentUser = null;
    profile = null;
    showLogin();
  }
  document.getElementById('loading-screen').style.display='none';
});

function showLogin() {
  document.getElementById('login-screen').style.display='flex';

function findOCN(n,id){if(n.id===id)return n;for(const c of(n.children||[])){const f=findOCN(c,id);if(f)return f;}return null;}
function findOCP(n,id){for(const c of(n.children||[])){if(c.id===id)return n;const f=findOCP(c,id);if(f)return f;}return null;}
function countOCN(n){return 1+(n.children||[]).reduce((a,c)=>a+countOCN(c),0);}
function renderOCN(n){
  const c=DC[n.dept]||'#888780';const canEdit=isAdmin()||getDept()==='HR';
  const box=`<div class="oc-box${canEdit?' editable':''}${n.id===selOCId?' sel':''}" style="border-top:3px solid ${c}" ${canEdit?`onclick="selOC(${n.id})"`:''}><div class="oc-nm">${n.name}</div><div class="oc-rl">${n.role}</div></div>`;
  const ch=n.children||[];
  if(!ch.length)return `<div class="oc-node">${box}</div>`;
  const vl=`<div style="width:1px;height:14px;background:var(--border);margin:0 auto"></div>`;
  const row=ch.map(c=>`<div style="display:inline-flex;flex-direction:column;align-items:center;padding:0 4px"><div style="width:1px;height:14px;background:var(--border);margin:0 auto"></div>${renderOCN(c)}</div>`).join('');
  return `<div class="oc-node">${box}${vl}<div style="display:inline-flex;align-items:flex-start">${row}</div></div>`;
}

function rOrg(){
  const canEdit=isAdmin()||getDept()==='HR';
  const sel=selOCId?findOCN(orgData,selOCId):null;
  const ep=sel&&canEdit?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:15px;font-weight:700">Modifier : ${sel.name}</span>
      <button class="btn-s" onclick="selOCId=null;go('org',document.querySelector('.ni.active'))">✕</button>
    </div>
    <div class="frm-r">
      <div><div class="frm-lbl">Nom</div><input id="oc-nm" value="${sel.name}"></div>
      <div><div class="frm-lbl">Rôle</div><input id="oc-rl" value="${sel.role}"></div>
      <div><div class="frm-lbl">Département</div><select id="oc-dp">${['Admin','Technical','Sales & Marketing','HR','Finance','Support'].map(d=>`<option${sel.dept===d?' selected':''}>${d}</option>`).join('')}</select></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-p" onclick="saveOC()">✓ Enregistrer</button>
      <button class="btn-s" onclick="addOCChild()">+ Subordonné</button>
      ${sel.id>2?`<button class="btn-s" style="color:var(--red)" onclick="delOC()">Supprimer</button>`:''}
    </div>
  </div>`:'';
  return `<div class="ph"><h1>Organigramme IMPROTECH</h1><p>${canEdit?'Touchez un poste pour modifier · ':'Lecture seule · '}${countOCN(orgData)} postes</p></div>
  <div class="oc-scroll"><div style="min-width:max-content;padding:8px">${renderOCN(orgData)}</div></div>${ep}`;
}

// ============================================================
// ONBOARDING
// ============================================================
function rObDetail(){
  const ob=onboardings.find(o=>o.id===viewObId);
  if(!ob){viewObId=null;return rOnboarding();}
  const pct=calcPct(ob);
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn-s" onclick="viewObId=null;go('ob',document.querySelector('.ni.active'))">&larr; Retour</button>
    <h1>${ob.name}</h1>${dbadge(ob.dept)}</div>
  <div class="card">
    ${[['Département',ob.dept],['Début',ob.start],['Manager',ob.mgr],['Email',ob.email]].map(r=>`
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="color:var(--muted)">${r[0]}</span><span style="font-weight:600">${r[1]}</span>
      </div>`).join('')}
    <div style="padding:12px 0">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:700">Progression</span><span style="font-weight:700;color:${pctColor(pct)}">${pct}%</span></div>
      ${progBar(pct,10)}
    </div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px">Checklist — ${ob.dept} <span style="font-size:12px;font-weight:400;color:var(--muted)">${ob.checklist.filter(t=>t.done).length}/${ob.checklist.length}</span></div>
    ${ob.checklist.map(t=>`
      <div class="chk-row" onclick="toggleOBTask(${ob.id},${t.id})">
        <div class="chk-box${t.done?' done':''}">${t.done?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>':''}</div>
        <span class="chk-lbl${t.done?' done':''}">${t.t}</span>
      </div>`).join('')}
  </div>`;
}

function rOnboarding(){
  if(!isAdmin()&&getDept()!=='HR')
    return `<div class="no-access"><div style="font-size:40px;margin-bottom:12px">🔒</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">Accès restreint</div><div>Ce module est réservé à l'équipe RH.</div></div>`;
  if(viewObId!==null)return rObDetail();
  const flist=obFilter==='Tous'?onboardings:onboardings.filter(o=>o.dept===obFilter);
  return `<div class="ph"><h1>Onboarding</h1><p>Intégration des nouveaux employés</p></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div class="sf" style="margin:0">${['Tous',...DEPTS].map(d=>`<button class="sf-btn${obFilter===d?' active':''}" onclick="obFilter='${d}';go('ob',document.querySelector('.ni.active'))">${d}</button>`).join('')}</div>
    <button class="btn-p" onclick="showOBForm=!showOBForm;go('ob',document.querySelector('.ni.active'))">${showOBForm?'✕ Annuler':'+ Nouvel onboarding'}</button>
  </div>
  ${showOBForm?`<div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px">Nouveau dossier d'onboarding</div>
    <div class="frm-r">
      <div><div class="frm-lbl">Nom complet *</div><input id="ob-nm" placeholder="Ex: Ama Owusu"></div>
      <div><div class="frm-lbl">Département *</div><select id="ob-dp">${DEPTS.map(d=>`<option>${d}</option>`).join('')}</select></div>
      <div><div class="frm-lbl">Date de début</div><input id="ob-st" placeholder="Ex: 5 Mai 2026"></div>
      <div><div class="frm-lbl">Manager direct</div><input id="ob-mg"></div>
      <div><div class="frm-lbl">Email professionnel</div><input id="ob-em" placeholder="prenom.nom@improtechsystems.com"></div>
      <div style="display:flex;align-items:flex-end"><button class="btn-p" onclick="createOB()" style="width:100%;margin-top:8px">Créer →</button></div>
    </div>
  </div>`:''}
  ${flist.length?flist.map(ob=>{const pct=calcPct(ob);const dc=DC[ob.dept]||'#534AB7';return `
    <div class="ob-card" onclick="viewObId=${ob.id};go('ob',document.querySelector('.ni.active'))">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
        <div><div style="font-size:15px;font-weight:700">${ob.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${ob.dept} · ${ob.start}</div></div>
        <div style="width:40px;height:40px;border-radius:50%;background:${dc}22;color:${dc};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700">${ob.name[0]}</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px"><span>Progression</span><span style="font-weight:700;color:${pctColor(pct)}">${pct}%</span></div>
      ${progBar(pct,7)}
      <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:12px;color:var(--muted)">
        <span>Manager : <b style="color:var(--text)">${ob.mgr}</b></span>
        <span>${ob.checklist.filter(t=>t.done).length}/${ob.checklist.length} tâches ›</span>
      </div>
    </div>`;}).join(''):'<div style="text-align:center;padding:40px 0;color:var(--muted)">Aucun onboarding actif.</div>'}`;
}

// ============================================================
// REPORTS
// ============================================================
function rRep(){
  const dept=getDept();
  if(!isAdmin()&&dept!=='Finance')
    return `<div class="no-access"><div style="font-size:40px;margin-bottom:12px">🔒</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">Accès restreint</div><div>Ce module est réservé à l'équipe Finance et aux administrateurs.</div></div>`;
  const byDept=DEPTS.map(d=>({d,tot:tasks.filter(t=>t.dept===d).length,done:tasks.filter(t=>t.dept===d&&t.st==='done').length}));
  const mx=Math.max(...byDept.map(x=>x.tot));
  return `<div class="ph"><h1>Rapports & Analytics</h1><p>Avril 2026</p></div>
  <div class="gkpi">${[['$140k','CA Avril'],['34%','Taux clôture'],['29','Étudiants'],['95%','Uptime']].map(k=>`<div class="kpi"><div class="kpi-v">${k[0]}</div><div class="kpi-l">${k[1]}</div></div>`).join('')}</div>
  <div class="card" style="margin-bottom:10px">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px">Tâches par département</div>
    ${byDept.map(x=>`<div class="dbar">
      <div style="font-size:12px;color:var(--muted);width:130px;flex-shrink:0">${x.d}</div>
      <div style="flex:1;height:9px;background:var(--bg);border-radius:5px;margin:0 8px"><div style="height:100%;border-radius:5px;background:${DC[x.d]||'#534AB7'};width:${mx?Math.round(x.tot/mx*100):0}%"></div></div>
      <span style="font-size:13px;font-weight:700;width:18px">${x.tot}</span>
      <span style="font-size:11px;color:var(--green);width:65px;text-align:right">${x.done} faites</span>
    </div>`).join('')}
  </div>
  <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:10px">Revenus mensuels</div><canvas id="rv2" height="170"></canvas></div>`;
}

function iRep(){
  const c=document.getElementById('rv2');if(!c||!window.Chart)return;
  if(chts.rv2)chts.rv2.destroy();
  chts.rv2=new window.Chart(c,{type:'line',data:{labels:revD.map(d=>d.m),datasets:[{label:'Services',data:revD.map(d=>d.s),borderColor:'#534AB7',backgroundColor:'rgba(83,74,183,0.1)',tension:0.4,fill:true,pointRadius:4},{label:'Formation',data:revD.map(d=>d.t),borderColor:'#BA7517',backgroundColor:'rgba(186,117,23,0.1)',tension:0.4,fill:true,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:12},callback:v=>'$'+v+'k'}}}}});
}

// ============================================================
// AI ASSISTANT
// ============================================================
function rAI(){
  const dept=getDept();const empty=!aiMsgs.length;
  return `<div class="ph"><h1>Assistant IA</h1><p>Propulsé par Claude · Contexte ${dept} activé</p></div>
  <div class="chat-m" id="cm">
    ${empty?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:20px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--purple-l);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--purple)">✧</div>
      <div style="font-size:15px;font-weight:700">Comment puis-je vous aider ?</div>
      <div style="font-size:13px;color:var(--muted)">Contexte ${dept} activé — je connais vos processus.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;max-width:420px">
        ${['Rédige un email de suivi client','Aide-moi avec une tâche urgente','Bonnes pratiques pour '+dept,'Résume les priorités cette semaine'].map(s=>`<button style="padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);font-size:12px;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;line-height:1.4" onclick="pf('${s.replace(/'/g,"\\'")}')">  ${s}</button>`).join('')}
      </div>
    </div>`:aiMsgs.map(m=>`<div class="${m.r==='u'?'mu':'ma'}">${m.c.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join('')}
  </div>
  <div class="chat-ir">
    <input id="ci" placeholder="Posez votre question..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}">
    <button class="btn-p" id="cb" onclick="sendAI()">Envoyer</button>
  </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
window.showTF = ()=>{const f=document.getElementById('tf-form');if(f)f.style.display=f.style.display==='none'?'block':'none';};
window.addTask = ()=>{const t=document.getElementById('nt')?.value.trim();if(!t)return;const dept=document.getElementById('nd')?.value||getDept();tasks.push({id:Date.now(),title:t,dept,p:document.getElementById('np').value,st:'todo',who:profile?.displayName||'—',due:document.getElementById('ndue').value||'—'});go('tasks',document.querySelector('.ni.active'));};
window.mv = (id,st)=>{const t=tasks.find(x=>x.id===id);if(t){t.st=st;go('tasks',document.querySelector('.ni.active'));}};
window.postAnn = ()=>{const au=document.getElementById('aa')?.value.trim(),bd=document.getElementById('ab')?.value.trim();if(!au||!bd)return;const dept=document.getElementById('ad').value;anns.unshift({id:Date.now(),au,dept,bd,tm:"l'instant"});const af=document.getElementById('af');if(af)af.innerHTML=renderAnns();document.getElementById('ab').value='';};
window.updTkt = (id,st)=>{const t=tickets.find(x=>x.id===id);if(t){t.st=st;go('sup',document.querySelector('.ni.active'));}};
window.selOC = id=>{if(!isAdmin()&&getDept()!=='HR')return;selOCId=id;go('org',document.querySelector('.ni.active'));};
window.saveOC = ()=>{const n=findOCN(orgData,selOCId);if(!n)return;n.name=document.getElementById('oc-nm').value;n.role=document.getElementById('oc-rl').value;n.dept=document.getElementById('oc-dp').value;selOCId=null;go('org',document.querySelector('.ni.active'));};
window.addOCChild = ()=>{const n=findOCN(orgData,selOCId);if(!n)return;if(!n.children)n.children=[];n.children.push({id:nextOCId++,name:"Nouveau poste",role:"Rôle",dept:n.dept,children:[]});go('org',document.querySelector('.ni.active'));};
window.delOC = ()=>{if(!confirm('Supprimer ce poste ?'))return;const p=findOCP(orgData,selOCId);if(!p)return;p.children=p.children.filter(c=>c.id!==selOCId);selOCId=null;go('org',document.querySelector('.ni.active'));};
window.createOB = ()=>{const name=document.getElementById('ob-nm')?.value.trim();if(!name)return;const dept=document.getElementById('ob-dp').value;const cl=(DTASKS[dept]||[]).map((t,i)=>({id:i+1,t,done:false}));onboardings.push({id:nextObId++,name,dept,start:document.getElementById('ob-st').value||'—',mgr:document.getElementById('ob-mg').value||'—',email:document.getElementById('ob-em').value||'—',checklist:cl});showOBForm=false;go('ob',document.querySelector('.ni.active'));};
window.toggleOBTask = (obId,tid)=>{const ob=onboardings.find(o=>o.id===obId);if(!ob)return;const t=ob.checklist.find(x=>x.id===tid);if(t)t.done=!t.done;go('ob',document.querySelector('.ni.active'));};
window.pf = t=>{const i=document.getElementById('ci');if(i){i.value=t;i.focus();}};

window.sendAI = async ()=>{
  const inp=document.getElementById('ci'),btn=document.getElementById('cb');
  const txt=inp?.value.trim();if(!txt||!inp)return;
  const dept=getDept();
  aiMsgs.push({r:'u',c:txt});inp.value='';btn.disabled=true;btn.textContent='...';
  const cm=document.getElementById('cm');
  if(cm){cm.innerHTML=aiMsgs.map(m=>`<div class="${m.r==='u'?'mu':'ma'}">${m.c.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join('');cm.scrollTop=cm.scrollHeight;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:`Tu es l'assistant IA interne d'IMPROTECH, Accra Ghana. Tu parles à ${profile?.displayName}, département ${dept}. Départements : Technical (CTO: Othniel), Sales & Marketing (MD: Tariq), HR (Kassum), Finance (Unclebert), Support. CEO: Verlein. Partenaires: Cisco, IBM, VMware, Palo Alto, Fortinet. Clients: MTN, Ecobank, GTBank, GRIDCO, SEMLEX. Adapte tes réponses au contexte ${dept}. Réponds en français, professionnel et concis.`,
      messages:aiMsgs.map(m=>({role:m.r==='u'?'user':'assistant',content:m.c})),
    })});
    const data=await res.json();
    aiMsgs.push({r:'a',c:data.content?.[0]?.text||'Erreur.'});
  }catch(e){aiMsgs.push({r:'a',c:'Erreur de connexion.'});}
  btn.disabled=false;btn.textContent='Envoyer';
  const cm2=document.getElementById('cm');
  if(cm2){cm2.innerHTML=aiMsgs.map(m=>`<div class="${m.r==='u'?'mu':'ma'}">${m.c.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join('');cm2.scrollTop=cm2.scrollHeight;}
};
</script>
