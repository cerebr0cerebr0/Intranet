<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--card:#fff;--text:#1a1a1a;--muted:#6b6a65;--border:#e0dfd8;
  --purple:#534AB7;--purple-d:#3C3489;--purple-l:#EEEDFE;
  --amber:#BA7517;--green:#1D9E75;--blue:#185FA5;--red:#D85A30;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1918;--card:#252422;--text:#f0ede8;--muted:#888780;--border:#333230;--purple-l:#26215C}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select,textarea{font-family:inherit}
.hidden{display:none !important}
.loading-screen,#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{width:100%;max-width:460px}
.login-logo{font-size:32px;font-weight:700;text-align:center;margin-bottom:4px}.login-logo b{color:var(--purple)}
.login-tagline{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:30px}
.login-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.login-input, .field, .textarea, .select{
  width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text);font-size:14px;outline:none
}
.login-input:focus,.field:focus,.textarea:focus,.select:focus{border-color:var(--purple)}
.login-input{margin-bottom:14px}
.textarea{resize:vertical;min-height:90px}
.login-btn,.btn-p{
  padding:12px 16px;border:none;border-radius:var(--radius);background:var(--purple);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer
}
.login-btn{width:100%}
.login-btn:hover,.btn-p:hover{background:var(--purple-d)}
.btn-s{font-size:13px;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);cursor:pointer}
.btn-danger{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}
.btn-success{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
.btn-link{background:none;border:none;color:var(--purple);cursor:pointer;padding:0}
.login-err,.notice{
  background:#FCEBEB;color:#501313;border:1px solid #F7C1C1;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:14px
}
.notice-ok{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.notice-info{background:#E6F1FB;color:#042C53;border-color:#B5D4F4}
#app-screen{display:none;min-height:100vh;max-width:1320px;margin:0 auto}
.sidebar{
  width:280px;background:var(--card);border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto
}
.app-shell{display:flex;min-height:100vh}
.brand{font-size:23px;font-weight:800;letter-spacing:-.4px;margin-bottom:2px}.brand b{color:var(--purple)}
.subbrand{font-size:12px;color:var(--muted);margin-bottom:18px}
.user-card{display:flex;gap:10px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);margin-bottom:14px}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.user-name{font-size:14px;font-weight:700}.user-meta{font-size:11px;color:var(--muted);margin-top:2px}
.nav{display:grid;gap:7px}
.nav button{display:flex;gap:10px;align-items:center;padding:11px 12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;text-align:left}
.nav button.active{background:var(--purple-l);border-color:var(--purple);font-weight:700}
.nav-ic{font-size:17px;width:22px;text-align:center}
.side-footer{margin-top:16px;display:grid;gap:8px}
.content{flex:1;padding:18px}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.searchbar{

.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}

.kpi-sub{font-size:11px;font-weight:700;margin-top:4px}

.bp{background:#EEEDFE;color:#26215C}.ba{background:#FAEEDA;color:#633806}.bt{background:#E1F5EE;color:#085041}.bc{background:#FAECE7;color:#4A1B0C}.bg{background:#f0efe8;color:#5F5E5A}.bgr{background:#EAF3DE;color:#173404}.bbl{background:#E6F1FB;color:#042C53}.bred{background:#FCEBEB;color:#501313}
.list{display:grid;gap:10px}
.item{border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:var(--card)}
.item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
.meta{font-size:12px;color:var(--muted)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters button{padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.filters button.active{background:var(--purple-l);border-color:var(--purple);color:#26215C;font-weight:700}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.form-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
@media (max-width:760px){.form-grid,.form-grid-3{grid-template-columns:1fr}}
.label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.empty{padding:30px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:var(--radius)}
.progress{height:8px;background:var(--bg);border-radius:99px;overflow:hidden}.progress>div{height:100%;background:var(--purple)}
.timeline{display:grid;gap:8px}
.timeline .item{background:var(--bg)}
.small{font-size:12px}
.tiny{font-size:11px;color:var(--muted)}
.chat-box{min-height:280px;max-height:380px;overflow:auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:grid;gap:10px;margin-bottom:12px}
.mu{justify-self:end;background:var(--purple);color:#fff;border-radius:16px 16px 4px 16px;padding:10px 14px;max-width:85%;white-space:pre-wrap}
.ma{justify-self:start;background:var(--card);border:1px solid var(--border);border-radius:16px 16px 16px 4px;padding:10px 14px;max-width:85%;white-space:pre-wrap}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}
.table th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:16px;z-index:300}
.modal{max-width:760px;width:100%;max-height:88vh;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px}
hr.sep{border:none;border-top:1px solid var(--border);margin:10px 0}
.right{margin-left:auto}
</style>
</head>

  if(!val) return '—';
  const d = typeof val === 'string' ? new Date(val) : (val.toDate ? val.toDate() : new Date(val));
  if(Number.isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
};
const fmtDateTime = (val) => {
  if(!val) return '—';

  const parts = name.trim().split(/\s+/).filter(Boolean);
  return parts.length > 1 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
};

const isAdmin = () => profile && ADMIN_ROLES.includes(profile.role);
const canAccess = (view) => {
  const dept = profile?.department;
  if(isAdmin()) return true;
  if(['dash','tasks','comm','docs','search','notifications','ai'].includes(view)) return true;
  if(view==='crm') return dept==='Sales & Marketing';
  if(view==='support') return dept==='Support' || dept==='Technical';
  if(view==='reports') return dept==='Finance';
  if(view==='onboarding') return dept==='HR';
  if(view==='admin') return false;
  if(view==='org') return true;
  return true;
};
const audit = async (action, module, detail={}) => {
  if(!currentUser || !profile) return;
  try{
    await addDoc(collection(db, COLLECTIONS.audit), {
      action, module, detail,
      actorUid: currentUser.uid,
      actorName: profile.displayName,
      actorDept: profile.department,
      createdAt: serverTimestamp()
    });
  }catch(e){ console.warn('Audit log failed', e); }
};

async function doLogin(){
  const email = $('login-email').value.trim();
  const pwd = $('login-pwd').value;
  const err = $('login-err');
  err.classList.add('hidden');
  if(!email || !pwd){
    err.textContent = 'Veuillez remplir tous les champs.'; err.classList.remove('hidden'); return;
  }
  $('login-btn').disabled = true;
  $('login-btn').textContent = 'Connexion...';
  try{
    await signInWithEmailAndPassword(auth, email, pwd);
  }catch(e){
    err.textContent = e.code === 'auth/unauthorized-domain'
      ? 'Domaine non autorisé dans Firebase Authentication.'
      : 'Email ou mot de passe incorrect.';
    err.classList.remove('hidden');
    $('login-btn').disabled = false;
    $('login-btn').textContent = 'Se connecter';
  }
}

onAuthStateChanged(auth, async (user) => {
  stopListeners();
  if(user){
    currentUser = user;
    await ensureProfile(user);
    await ensureSeedData();
    bindLiveData();
    renderShell();
    setView('dash');
    $('app-screen').style.display='block';
    $('login-screen').classList.add('hidden');
  }else{
    currentUser = null;
    profile = null;
    cache = {tasks:[],announcements:[],tickets:[],leads:[],docs:[],onboarding:[],org:[],users:[],notifications:[],audit:[]};
    $('app-screen').style.display='none';
    $('login-screen').classList.remove('hidden');
    $('login-btn').disabled = false;
    $('login-btn').textContent = 'Se connecter';
  }
  $('loading-screen').style.display='none';
});

async function ensureProfile(user){
  const ref = doc(db, COLLECTIONS.users, user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    profile = {id:snap.id, ...snap.data()};
  }else{
    profile = DEFAULT_PROFILE(user);
    await setDoc(ref, {...profile, createdAt: serverTimestamp(), lastLoginAt: serverTimestamp()});
  }
  await updateDoc(ref, {lastLoginAt: serverTimestamp()}).catch(()=>{});
}

async function ensureSeedData(){
  const metaRef = doc(db, '_meta', 'bootstrap');
  const metaSnap = await getDoc(metaRef);
  if(metaSnap.exists()) return;

  for(const t of SEED.tasks) await addDoc(collection(db, COLLECTIONS.tasks), {...t, createdAt:serverTimestamp(), createdBy:currentUser.uid, comments:[], attachments:[]});
  for(const a of SEED.announcements) await addDoc(collection(db, COLLECTIONS.announcements), {...a, publishedAt:serverTimestamp(), targetDept:null});
  for(const t of SEED.tickets) await addDoc(collection(db, COLLECTIONS.tickets), {...t, createdAt:serverTimestamp(), updatedAt:serverTimestamp(), internalNotes:[]});
  for(const l of SEED.leads) await addDoc(collection(db, COLLECTIONS.leads), {...l, createdAt:serverTimestamp(), updatedAt:serverTimestamp(), source:'Direct', notes:''});
  for(const d of SEED.documents) await addDoc(collection(db, COLLECTIONS.documents), {...d, createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
  for(const o of SEED.onboarding) await addDoc(collection(db, COLLECTIONS.onboarding), {...o, createdAt:serverTimestamp(), updatedAt:serverTimestamp()});

  const orgMap = {};
  const ceo = await addDoc(collection(db, COLLECTIONS.org), {...SEED.org[0], createdAt:serverTimestamp()}); orgMap.seed_ceo = ceo.id;
  const md = await addDoc(collection(db, COLLECTIONS.org), {...SEED.org[1], managerId:orgMap.seed_ceo, createdAt:serverTimestamp()}); orgMap.seed_md = md.id;
  for(const n of SEED.org.slice(2)) await addDoc(collection(db, COLLECTIONS.org), {...n, managerId:orgMap.seed_md, createdAt:serverTimestamp()});

  await addDoc(collection(db, COLLECTIONS.notifications), {
    title:'Bienvenue sur IMPROTECH Enterprise',
    body:'Votre intranet est prêt. Vérifiez les règles Firestore et le domaine autorisé Firebase.',
    deptScope:'company',
    userUid:null,
    readBy:[],
    createdAt:serverTimestamp(),
    type:'system'
  });

  await setDoc(metaRef, {seededAt:serverTimestamp(), seededBy:currentUser.uid});
}

// LIVE DATA
// ------------------------------------------------------------
function stopListeners(){
  unsubscribers.forEach(fn=>{ try{fn();}catch{} });
  unsubscribers = [];
}

function bindLiveData(){
  const listen = (key, qRef, mapFn=(d)=>({id:d.id,...d.data()})) => {
    const unsub = onSnapshot(qRef, snap => {
      cache[key] = snap.docs.map(mapFn);
      if(currentView === 'search' && globalSearchQuery) renderCurrentView();
      if(['dash','tasks','comm','crm','support','docs','reports','onboarding','org','notifications','admin'].includes(currentView)) renderCurrentView();
      updateNavBadges();
    });
    unsubscribers.push(unsub);
  };

  listen('tasks', query(collection(db, COLLECTIONS.tasks), orderBy('createdAt','desc')));
  listen('announcements', query(collection(db, COLLECTIONS.announcements), orderBy('publishedAt','desc')));
  listen('tickets', query(collection(db, COLLECTIONS.tickets), orderBy('updatedAt','desc')));
  listen('leads', query(collection(db, COLLECTIONS.leads), orderBy('updatedAt','desc')));
  listen('docs', query(collection(db, COLLECTIONS.documents), orderBy('updatedAt','desc')));
  listen('onboarding', query(collection(db, COLLECTIONS.onboarding), orderBy('updatedAt','desc')));
  listen('org', query(collection(db, COLLECTIONS.org), orderBy('level','asc'), orderBy('sortOrder','asc')));
  listen('users', query(collection(db, COLLECTIONS.users), orderBy('displayName','asc')));
  listen('notifications', query(collection(db, COLLECTIONS.notifications), orderBy('createdAt','desc'), limit(50)));
  listen('audit', query(collection(db, COLLECTIONS.audit), orderBy('createdAt','desc'), limit(100)));
}

function scopedTasks(){
  if(isAdmin()) return cache.tasks;
  return cache.tasks.filter(t => t.dept === profile.department || t.assigneeUid === currentUser.uid || t.assigneeName === profile.displayName);
}
function scopedAnnouncements(){
  if(isAdmin()) return cache.announcements;
  return cache.announcements.filter(a => a.scope === 'company' || !a.targetDept || a.targetDept === profile.department);
}
function scopedTickets(){
  if(isAdmin()) return cache.tickets;
  if(profile.department === 'Support' || profile.department === 'Technical') return cache.tickets;
  return cache.tickets.filter(t => t.requesterUid === currentUser.uid);
}
function scopedLeads(){
  if(isAdmin()) return cache.leads;
  return profile.department === 'Sales & Marketing' ? cache.leads : [];
}
function scopedDocs(){
  if(isAdmin()) return cache.docs;
  return cache.docs.filter(d => !Array.isArray(d.access) || d.access.includes(profile.department) || d.access.includes('company'));
}
function scopedOnboarding(){
  if(isAdmin()) return cache.onboarding;
  return profile.department === 'HR' ? cache.onboarding : cache.onboarding.filter(o => o.email === profile.email);
}
function pctOnboarding(o){
  const total = Array.isArray(o.checklist) ? o.checklist.length : 0;
  const done = Array.isArray(o.checklist) ? o.checklist.filter(x => x.done).length : 0;
  return total ? Math.round((done/total)*100) : 0;
}
function scopeNotif(n){
  if(isAdmin()) return true;
  if(n.userUid && n.userUid === currentUser.uid) return true;
  if(!n.userUid && (n.deptScope === 'company' || n.deptScope === profile.department)) return true;
  return false;
}
function unreadNotifications(){
  return cache.notifications.filter(n => scopeNotif(n) && (!Array.isArray(n.readBy) || !n.readBy.includes(currentUser.uid)));
}
async function markNotificationRead(id){
  const n = cache.notifications.find(x=>x.id===id);
  if(!n) return;
  const readBy = Array.isArray(n.readBy) ? [...new Set([...n.readBy, currentUser.uid])] : [currentUser.uid];
  await updateDoc(doc(db, COLLECTIONS.notifications, id), {readBy});
}
async function createNotification({title, body, deptScope='company', userUid=null, type='info'}){
  await addDoc(collection(db, COLLECTIONS.notifications), {
    title, body, deptScope, userUid, type, readBy:[], createdAt:serverTimestamp()
  });
}

async function createTask(){
  const title = $('task-title').value.trim();
  if(!title){ notify('Titre requis.'); return; }
  const payload = {
    title,
    dept:$('task-dept').value,
    assigneeName:$('task-assignee').value.trim() || '—',
    assigneeUid:'',
    priority:$('task-priority').value,
    status:$('task-status').value,
    dueDate:$('task-due').value || null,
    description:$('task-desc').value.trim(),
    comments:[],
    attachments:[],
    createdBy:currentUser.uid,
    createdByName:profile.displayName,
    createdAt:serverTimestamp(),
    updatedAt:serverTimestamp()
  };
  await addDoc(collection(db, COLLECTIONS.tasks), payload);
  await audit('create','tasks',{title});
  await createNotification({title:'Nouvelle tâche',body:`${title} a été créée.`,deptScope:payload.dept});
  notify('Tâche créée.', 'ok');
  ['task-title','task-assignee','task-desc','task-due'].forEach(id => $(id).value='');
}
async function updateTaskStatus(id,status){
  await updateDoc(doc(db, COLLECTIONS.tasks, id), {status, updatedAt:serverTimestamp()});
  await audit('update_status','tasks',{id,status});
  notify('Statut mis à jour.', 'ok');
}
function openTaskComment(id){
  const t = cache.tasks.find(x=>x.id===id);
  if(!t) return;
  openModal('Commenter la tâche', `
    <div class="small"><b>${esc(t.title)}</b></div>
    <div class="tiny" style="margin-top:4px">Ajoute un commentaire traçable dans l’historique.</div>
    <div style="margin-top:10px"><textarea id="comment-text" class="textarea"></textarea></div>
    <div class="row" style="margin-top:10px"><button class="btn-p" id="save-comment">Enregistrer</button></div>
  `);
  $('save-comment').addEventListener('click', async () => {
    const text = $('comment-text').value.trim();
    if(!text) return;
    const comments = [...(t.comments||[]), {author:profile.displayName, uid:currentUser.uid, text, at:new Date().toISOString()}];
    await updateDoc(doc(db, COLLECTIONS.tasks, id), {comments, updatedAt:serverTimestamp()});
    await audit('comment','tasks',{id});
    closeModal();
    notify('Commentaire ajouté.', 'ok');
  });
}

async function advanceLead(id){
  const stages = ['Prospection','Qualification','Proposition','Négociation','Gagné'];

  const stage = idx >= 0 && idx < stages.length - 1 ? stages[idx+1] : lead.stage;
  await updateDoc(doc(db, COLLECTIONS.leads, id), {stage, updatedAt:serverTimestamp()});
  await audit('advance_stage','leads',{id,stage});

async function toggleOnboardingCheck(id, idx, done){
  const ob = cache.onboarding.find(x=>x.id===id); if(!ob) return;
  const checklist = [...(ob.checklist||[])];
  checklist[idx] = {...checklist[idx], done};

  await updateDoc(doc(db, COLLECTIONS.onboarding, id), {checklist, status: completed ? 'completed' : 'in_progress', updatedAt:serverTimestamp()});
  await audit('update_checklist','onboarding',{id,idx,done});
}

    ...scopedTasks().filter(x=>searchIn(x,['title','description','assigneeName'])).map(x=>({module:'Tâche', title:x.title, meta:`${x.dept} · ${x.assigneeName || '—'}`, body:x.description || ''})),
    ...scopedTickets().filter(x=>searchIn(x,['title','description','requester','category'])).map(x=>({module:'Ticket', title:x.title, meta:`${x.dept} · ${x.requester || '—'}`, body:x.description || ''})),
    ...scopedLeads().filter(x=>searchIn(x,['company','contact','service','nextAction'])).map(x=>({module:'Lead', title:x.company, meta:`${x.service} · ${money(x.value)}`, body:x.nextAction || ''})),
    ...scopedAnnouncements().filter(x=>searchIn(x,['authorName','body'])).map(x=>({module:'Annonce', title:x.authorName, meta:x.targetDept || 'Entreprise', body:x.body || ''})),
    ...scopedDocs().filter(x=>searchIn(x,['title','summary','category'])).map(x=>({module:'Document', title:x.title, meta:x.ownerDept || '—', body:x.summary || ''})),
    ...cache.users.filter(x=>isAdmin() && searchIn(x,['displayName','email','department','role'])).map(x=>({module:'Utilisateur', title:x.displayName, meta:`${x.role} · ${x.department}`, body:x.email || ''}))
  ] : [];
  $('view').innerHTML = `
    <div class="card">
      <div class="toolbar">
        <h3>Recherche</h3>
        <div class="row">
          <input id="search-inline" class="field" value="${esc(globalSearchQuery)}" placeholder="Tape un mot-clé..." style="min-width:300px">
          <button class="btn-p" id="search-run">Chercher</button>
        </div>
      </div>
      ${q ? `<div class="tiny">${results.length} résultat(s)</div>` : `<div class="tiny">Recherche sur tâches, tickets, annonces, documents, leads et utilisateurs.</div>`}
    </div>
    <div class="list" style="margin-top:12px">
      ${q ? (results.map(r => `
        <div class="item">
          <div class="item-top"><div><b>${esc(r.title)}</b><div class="meta">${esc(r.module)} · ${esc(r.meta)}</div></div></div>
          <div class="small" style="margin-top:7px">${esc(r.body)}</div>
        </div>
      `).join('') || `<div class="empty">Aucun résultat.</div>`) : `<div class="empty">Entre une recherche pour afficher les résultats.</div>`}
    </div>
  `;
  $('search-run').addEventListener('click', ()=>{
    globalSearchQuery = $('search-inline').value.trim();
    $('global-search-input').value = globalSearchQuery;
    renderSearch();
  });
}

function renderNotifications(){
  setPage('Notifications', 'Centre de notifications, alertes métier et suivi');
  const list = cache.notifications.filter(scopeNotif);
  $('view').innerHTML = `
    <div class="card">
      <div class="toolbar">
        <h3>Créer une notification</h3>
        <div class="tiny">${unreadNotifications().length} non lue(s)</div>
      </div>
      <div class="form-grid-3">
        <div><div class="label">Titre</div><input id="notif-title" class="field"></div>
        <div><div class="label">Portée</div><select id="notif-scope" class="select"><option value="company">Entreprise</option>${DEPTS.filter(d=>d!=='Admin').map(d=>`<option value="${d}">${d}</option>`).join('')}</select></div>
        <div><div class="label">Type</div><select id="notif-type" class="select"><option value="info">Info</option><option value="warning">Warning</option><option value="system">System</option></select></div>
      </div>
      <div style="margin-top:10px"><div class="label">Message</div><textarea id="notif-body" class="textarea"></textarea></div>
      <div class="row" style="margin-top:10px"><button class="btn-p" id="notif-create">Envoyer</button></div>
    </div>
    <div class="list" style="margin-top:12px">
      ${list.map(n => {
        const unread = !Array.isArray(n.readBy) || !n.readBy.includes(currentUser.uid);
        return `
          <div class="item">
            <div class="item-top">
              <div><b>${esc(n.title)}</b> ${unread ? badge('Nouveau','bp') : ''}<div class="meta">${fmtDateTime(n.createdAt)} · ${esc(n.deptScope || '—')}</div></div>
              ${badge(n.type || 'info', n.type==='warning'?'ba':n.type==='system'?'bbl':'bg')}
            </div>
            <div class="small" style="margin-top:8px">${esc(n.body)}</div>
            ${unread ? `<div class="row" style="margin-top:10px"><button class="btn-s" data-read="${n.id}">Marquer comme lu</button></div>` : ''}
          </div>
        `;
      }).join('') || `<div class="empty">Aucune notification.</div>`}
    </div>
  `;
  $('notif-create').addEventListener('click', async ()=>{
    const title = $('notif-title').value.trim(); const body = $('notif-body').value.trim();
    if(!title || !body){ notify('Titre et message requis.'); return; }
    await createNotification({title, body, deptScope:$('notif-scope').value, type:$('notif-type').value});
    await audit('create','notifications',{title});
    notify('Notification envoyée.', 'ok');
  });
  [...$('view').querySelectorAll('[data-read]')].forEach(btn => btn.addEventListener('click', async ()=>{ await markNotificationRead(btn.dataset.read); notify('Marquée comme lue.', 'ok'); }));
}

function renderAdmin(){
  if(!canAccess('admin')) return renderNoAccess();
  setPage('Administration', 'Gestion des profils, rôles, paramètres et audit');
  $('view').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h3>Utilisateurs</h3>
        <table class="table">
          <thead><tr><th>Nom</th><th>Email</th><th>Département</th><th>Rôle</th><th></th></tr></thead>
          <tbody>
            ${cache.users.map(u => `
              <tr>
                <td>${esc(u.displayName || '—')}</td>
                <td>${esc(u.email || '—')}</td>
                <td>${esc(u.department || '—')}</td>
                <td>${esc(u.role || 'Employee')}</td>
                <td><button class="btn-s" data-edit-user="${u.id}">Modifier</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="tiny" style="margin-top:8px">La création des comptes Auth se fait dans Firebase Authentication. Ici, on administre les profils et rôles.</div>
      </div>
      <div class="card">
        <h3>Audit récent</h3>
        <div class="timeline">
          ${cache.audit.slice(0,20).map(a => `
            <div class="item">
              <b>${esc(a.actorName || '—')}</b> a fait <b>${esc(a.action)}</b> dans <b>${esc(a.module)}</b>
              <div class="tiny">${fmtDateTime(a.createdAt)}</div>
            </div>
          `).join('') || `<div class="empty">Aucun audit.</div>`}
        </div>
      </div>
    </div>
  `;
  [...$('view').querySelectorAll('[data-edit-user]')].forEach(btn => btn.addEventListener('click', ()=>openUserEditor(btn.dataset.editUser)));
}
function openUserEditor(id){
  const user = cache.users.find(x=>x.id===id); if(!user) return;
  openModal('Modifier utilisateur', `
    <div class="form-grid">
      <div><div class="label">Nom</div><input id="edit-user-name" class="field" value="${esc(user.displayName || '')}"></div>
      <div><div class="label">Département</div><select id="edit-user-dept" class="select">${DEPTS.map(d=>`<option ${user.department===d?'selected':''}>${d}</option>`).join('')}</select></div>
      <div><div class="label">Rôle</div><select id="edit-user-role" class="select">${['Employee','Admin','CEO','MD','CTO','Manager'].map(r=>`<option ${user.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div><div class="label">Manager</div><input id="edit-user-manager" class="field" value="${esc(user.managerName || '')}"></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn-p" id="save-user-profile">Enregistrer</button></div>
  `);
  $('save-user-profile').addEventListener('click', async ()=>{
    await updateDoc(doc(db, COLLECTIONS.users, id), {
      displayName:$('edit-user-name').value.trim(),
      department:$('edit-user-dept').value,
      role:$('edit-user-role').value,
      managerName:$('edit-user-manager').value.trim(),
      updatedAt:serverTimestamp()
    });
    await audit('update','users',{id});
    closeModal();
    notify('Profil mis à jour.', 'ok');
  });
}

function renderAI(){
  setPage('Assistant IA', 'Assistant interne avec backend sécurisé requis');
  $('view').innerHTML = `
    <div class="card notice notice-info">
      Pour la production, branche ce module sur un backend sécurisé, par exemple <code>/api/ai</code>, qui injecte la clé API et applique les contrôles d’accès.
    </div>
    <div class="chat-box" id="ai-chat">
      ${aiMsgs.length ? aiMsgs.map(m => `<div class="${m.role==='user'?'mu':'ma'}">${esc(m.text)}</div>`).join('') : `
        <div class="empty">Exemples: “rédige un email de suivi client”, “résume les tickets urgents”, “prépare un compte-rendu de réunion”.</div>
      `}
    </div>
    <div class="row">
      <input id="ai-input" class="field" placeholder="Pose ta question..." style="flex:1">
      <button class="btn-p" id="ai-send">Envoyer</button>
    </div>
  `;
  $('ai-send').addEventListener('click', sendAI);
  $('ai-input').addEventListener('keydown', e => { if(e.key==='Enter') sendAI(); });
}
async function sendAI(){
  const input = $('ai-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  aiMsgs.push({role:'user', text});
  input.value = '';
  renderAI();

  try{
    const res = await fetch('/api/ai', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        prompt:text,
        context:{
          user:profile.displayName,
          dept:profile.department,
          role:profile.role,
          tasks:scopedTasks().slice(0,10),
          tickets:scopedTickets().slice(0,10),
          announcements:scopedAnnouncements().slice(0,5)
        }
      })
    });
    const data = await res.json();
    aiMsgs.push({role:'assistant', text:data.reply || "Aucune réponse du backend IA."});
  }catch(e){
    aiMsgs.push({role:'assistant', text:"Le backend IA n'est pas encore branché. Remplace /api/ai par une fonction serverless sécurisée."});
  }
  renderAI();
}

function renderNoAccess(){
  $('view').innerHTML = `<div class="empty">Accès restreint pour votre rôle.</div>`;
}
function openModal(title, body){
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = body;
  $('modal-backdrop').style.display = 'flex';
}
function closeModal(){
  $('modal-backdrop').style.display = 'none';
  $('modal-body').innerHTML = '';
}
async function deleteEntity(col, id, successMsg='Supprimé'){
  if(!confirm('Confirmer la suppression ?')) return;
  await deleteDoc(doc(db, col, id));
  await audit('delete',col,{id});
  notify(successMsg, 'ok');
}
